name: PhD Bibliography TeX compilation

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "main.pdf"

permissions:
  contents: read

jobs:
  build_tex_phd_bibliography:

    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
    - uses: actions/checkout@v4

    - name: Build TeX
      run: |
        docker run --rm -v $PWD:/workspace -w /workspace texlive/texlive sh -c \
        "pdflatex -interaction=nonstopmode -synctex=1 main.tex && biber main && pdflatex -interaction=nonstopmode -synctex=1 main.tex && pdflatex -interaction=nonstopmode -synctex=1 main.tex"

    - name: Commit output PDF
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git checkout --orphan pdf
        git add main.pdf
        git commit -m "Update PDF"
        git push origin pdf --force